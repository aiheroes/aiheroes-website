<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Personal Banner - Jan Brusse (with profile pic mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .container {
      width: 1584px;
      height: 396px;
      background: #FDFCF8;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 100px 0 280px;
      gap: 80px;
    }

    /* Profile Picture Mockup */
    .profile-pic-mockup {
      position: absolute;
      bottom: 24px;
      left: 24px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(28, 25, 23, 0.08);
      border: 4px solid rgba(28, 25, 23, 0.15);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(28, 25, 23, 0.4);
      text-align: center;
      line-height: 1.4;
      z-index: 100;
    }

    /* Hide mockup when saving/printing */
    @media print {
      .profile-pic-mockup {
        display: none;
      }
    }

    .profile-pic-mockup:hover {
      cursor: pointer;
      opacity: 0.5;
    }

    /* Left side - Tagline */
    .left-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #D9534F;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      align-self: flex-start;
    }

    .role-icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 600;
      color: #1C1917;
      line-height: 1.1;
    }

    .tagline .underline-red {
      text-decoration: underline;
      text-decoration-color: #D9534F;
      text-decoration-thickness: 6px;
      text-underline-offset: 8px;
    }

    .tagline .underline-blue {
      text-decoration: underline;
      text-decoration-color: #2563EB;
      text-decoration-thickness: 6px;
      text-underline-offset: 8px;
    }

    .description {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #A8A29E;
      letter-spacing: 0.3px;
    }

    /* Right side */
    .right-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }

    .expertise-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .expertise-item {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #57534E;
      line-height: 1.4;
    }

    .team-label {
      position: absolute;
      bottom: 24px;
      right: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #A8A29E;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .accent-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #D9534F;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Profile Picture Mockup -->
    <div class="profile-pic-mockup" onclick="this.style.display='none'">PROFILE<br>PICTURE</div>

    <div class="left-section">
      <div class="role-badge">
        <svg class="role-icon" viewBox="0 0 24 24">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        <span>Technical AI</span>
      </div>
      <h1 class="tagline">AI <span class="underline-red">werkt</span> als je<br>weet <span class="underline-blue">hoe</span></h1>
      <p class="description">aiheroes.io</p>
    </div>

    <div class="right-section">
      <div class="expertise-list">
        <div class="expertise-item">LLM API Development</div>
        <div class="expertise-item">RAG Systems</div>
        <div class="expertise-item">AI Agents</div>
      </div>
    </div>

    <div class="team-label">Jan Brusse · AI Heroes</div>

    <div class="accent-line"></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  /* Background image — the consultancy hero photo */
  .bg-image {
    position: absolute;
    inset: 0;
    background: url('./hero/glass.webp') center/cover no-repeat;
  }

  /* Dark gradient overlay — heavier on left for text readability */
  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right,
        rgba(28, 25, 23, 0.92) 0%,
        rgba(28, 25, 23, 0.75) 40%,
        rgba(28, 25, 23, 0.15) 100%
      );
  }

  /* Content */
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 88px;
  }

  /* Logo + wordmark */
  .logo-row {
    position: absolute;
    top: 48px;
    left: 88px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: #D9534F;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 36px;
    height: 36px;
  }

  .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: #FDFCF8;
    letter-spacing: 0.3px;
  }

  /* Main headline */
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: normal;
    font-size: 80px;
    line-height: 1.15;
    color: #FDFCF8;
    margin-bottom: 28px;
  }

  .headline .red {
    position: relative;
    display: inline;
  }

  .headline .red::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 2px;
    width: 100%;
    height: 5px;
    background: #D9534F;
    border-radius: 3px;
  }

  .headline .blue {
    position: relative;
    display: inline;
  }

  .headline .blue::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 2px;
    width: 100%;
    height: 5px;
    background: #2563EB;
    border-radius: 3px;
  }

  /* Subhead */
  .subhead {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    color: rgba(253, 252, 248, 1);
    line-height: 1.5;
    max-width: 600px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #D9534F 0%, #7C4CC4 50%, #2563EB 100%);
  }

  /* Bottom info row */
  .bottom-row {
    position: absolute;
    bottom: 28px;
    left: 88px;
    right: 88px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: rgba(253, 252, 248, 0.7);
    letter-spacing: 1px;
  }

  .pillars {
    display: flex;
    gap: 24px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .pillar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pillar-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .pillar-dot.red { background: #D9534F; }
  .pillar-dot.mixed { background: #D6D3D1; }
  .pillar-dot.blue { background: #2563EB; }

  .pillar-label {
    color: rgba(253, 252, 248, 0.8);
  }
</style>
</head>
<body>
  <div class="card">
    <!-- Background -->
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <!-- Logo -->
    <div class="logo-row">
      <div class="logo-icon">

          </g>
        </svg>
      </div>
      <span class="logo-text">AI Heroes</span>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1 class="headline">
        <span class="red">Weet</span> waar AI<br>
        <span class="blue">waarde</span> cre&euml;ert
      </h1>
      <p class="subhead">
        AI <b>werkt</b> als je weet <b>hoe</b>.<br>
        Training, consultancy en software onder &eacute;&eacute;n dak.
      </p>
    </div>

    <!-- Bottom info -->
    <div class="bottom-row">
      <span class="domain">aiheroes.io</span>
      <div class="pillars">
        <div class="pillar">
          <div class="pillar-dot red"></div>
          <span class="pillar-label">Training</span>
        </div>
        <div class="pillar">
          <div class="pillar-dot blue"></div>
          <span class="pillar-label">Consultancy</span>
        </div>
        <div class="pillar">
          <div class="pillar-dot mixed"></div>
          <span class="pillar-label">Software</span>
        </div>
      </div>
    </div>

    <!-- Gradient bottom bar -->
    <div class="bottom-bar"></div>
  </div>
</body>
</html>
